name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: palco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Usada pelo `prisma generate` e pelo `prisma migrate deploy` do build —
      # o banco "postgres" (sempre presente numa imagem Postgres nova) valida
      # que as migrations aplicam limpas, sem colidir com o banco dos testes.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      # Banco isolado dos testes (globalSetup faz `db push --force-reset`).
      TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/palco_test"
      AUTH_SECRET: "ci-secret-not-used-in-production"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
